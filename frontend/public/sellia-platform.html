<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SellIA — Plataforma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060812;--bg2:#08091a;--bg3:#0d0f26;--sb:#070a14;
  --or:#FF6B35;--or2:#FF8C5A;--od:rgba(255,107,53,.12);
  --vi:#7C3AED;--vi2:#9F6EF0;--vd:rgba(124,58,237,.12);
  --te:#00D4AA;--te2:#33E0BF;--td:rgba(0,212,170,.12);
  --bl:#0EA5E9;--bld:rgba(14,165,233,.12);
  --wh:#F0F2FF;--mu:rgba(240,242,255,.42);--fa:rgba(240,242,255,.04);
  --bo:rgba(240,242,255,.07);--bo2:rgba(240,242,255,.12);
  --FD:'Syne',sans-serif;--FB:'Inter',sans-serif;--sb-w:260px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--wh);font-family:var(--FB)}
body{display:flex;cursor:default}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--bo2);border-radius:2px}

/* SIDEBAR */
#sidebar{width:var(--sb-w);min-width:var(--sb-w);height:100vh;background:var(--sb);border-right:1px solid var(--bo);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;position:relative;z-index:100}
.sb-logo{padding:18px 20px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bo)}
.sb-logo-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--or),var(--vi));display:flex;align-items:center;justify-content:center;font-family:var(--FD);font-weight:800;font-size:16px;color:#fff}
.sb-logo-text{font-family:var(--FD);font-size:19px;font-weight:800;background:linear-gradient(135deg,var(--or),var(--vi));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:100px;background:var(--od);color:var(--or);border:1px solid rgba(255,107,53,.2);text-transform:uppercase;letter-spacing:.08em}
.sb-nav{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:1px}
.sb-section{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(240,242,255,.22);padding:10px 10px 5px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;font-size:12.5px;font-weight:500;color:rgba(240,242,255,.4);cursor:pointer;transition:all .15s;border:1px solid transparent;white-space:nowrap}
.nav-item:hover{background:rgba(240,242,255,.04);color:rgba(240,242,255,.7)}
.nav-item.active{background:var(--od);color:var(--or);border-color:rgba(255,107,53,.2)}
.nav-item .ni{font-size:14px;min-width:18px;text-align:center}
.sb-plan{margin:10px;padding:14px;background:linear-gradient(135deg,rgba(255,107,53,.08),rgba(124,58,237,.08));border:1px solid rgba(255,107,53,.18);border-radius:12px}
.sb-plan-title{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.sb-plan-name{font-family:var(--FD);font-size:14px;font-weight:700;color:var(--or)}
.sb-plan-info{font-size:10px;color:var(--mu);margin-top:2px}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
#topbar{height:58px;min-height:58px;background:var(--bg2);border-bottom:1px solid var(--bo);display:flex;align-items:center;padding:0 22px;gap:14px;flex-shrink:0}
.tb-title{font-family:var(--FD);font-size:16px;font-weight:700;flex:1}
.tb-search{display:flex;align-items:center;gap:8px;background:var(--fa);border:1px solid var(--bo);border-radius:10px;padding:7px 13px;min-width:200px}
.tb-search input{background:transparent;border:none;outline:none;color:var(--wh);font-size:12.5px;font-family:var(--FB);width:100%}
.tb-search input::placeholder{color:var(--mu)}
.tb-icon{width:33px;height:33px;border-radius:9px;background:var(--fa);border:1px solid var(--bo);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:all .2s;position:relative}
.tb-icon:hover{background:var(--od);border-color:rgba(255,107,53,.2)}
.tb-dot{position:absolute;top:6px;right:7px;width:6px;height:6px;border-radius:50%;background:var(--or)}
.tb-avatar{width:33px;height:33px;border-radius:50%;background:linear-gradient(135deg,var(--or),var(--vi));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer}
.lang-sel{background:var(--fa);border:1px solid var(--bo);border-radius:9px;color:var(--wh);font-size:12px;padding:7px 9px;font-family:var(--FB);cursor:pointer;outline:none}
.lang-sel option{background:var(--bg2)}

/* CONTENT */
#content{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--bg);position:relative}
.page{display:none;padding:26px;animation:pgIn .3s ease-out}
.page.active{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pg-head{margin-bottom:22px}
.pg-h1{font-family:var(--FD);font-size:24px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:10px}
.pg-sub{font-size:13px;color:var(--mu);margin-top:5px}

/* CARDS */
.card{background:var(--fa);border:1px solid var(--bo);border-radius:16px;padding:20px;transition:border-color .25s}
.card:hover{border-color:var(--bo2)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{padding:18px;background:var(--fa);border:1px solid var(--bo);border-radius:14px;display:flex;flex-direction:column;gap:10px;transition:all .25s}
.stat-card:hover{border-color:var(--bo2);transform:translateY(-2px)}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between}
.sc-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
.sc-trend{font-size:11px;font-weight:600;padding:3px 8px;border-radius:100px}
.sc-val{font-family:var(--FD);font-size:25px;font-weight:800;line-height:1;letter-spacing:-.02em}
.sc-label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-family:var(--FD);font-size:15px;font-weight:700}
.sec-subtitle{font-size:12px;color:var(--mu);margin-top:2px}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:var(--FB)}
.btn-primary{background:linear-gradient(135deg,var(--or),var(--vi));color:#fff;box-shadow:0 0 24px rgba(255,107,53,.2)}
.btn-primary:hover{opacity:.88;transform:scale(1.02)}
.btn-ghost{background:var(--fa);border:1px solid var(--bo2);color:var(--wh)}
.btn-ghost:hover{background:var(--od);border-color:rgba(255,107,53,.3);color:var(--or)}
.btn-sm{padding:6px 14px;font-size:11px}
.btn-teal{background:var(--td);border:1px solid rgba(0,212,170,.2);color:var(--te)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.badge-or{background:var(--od);color:var(--or);border:1px solid rgba(255,107,53,.2)}
.badge-te{background:var(--td);color:var(--te);border:1px solid rgba(0,212,170,.2)}
.badge-vi{background:var(--vd);color:var(--vi2);border:1px solid rgba(124,58,237,.2)}
.badge-bl{background:var(--bld);color:var(--bl);border:1px solid rgba(14,165,233,.2)}
.badge-live::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:currentColor;animation:bl 1.5s ease-in-out infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}

/* TABS */
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:18px}
.tab{padding:7px 15px;border-radius:100px;font-size:12px;font-weight:600;color:var(--mu);cursor:pointer;transition:all .18s;white-space:nowrap;background:var(--fa);border:1px solid var(--bo)}
.tab:hover{color:var(--wh)}
.tab.on{background:var(--od);color:var(--or);border-color:rgba(255,107,53,.25)}

/* AGENT CARDS */
.ag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px}
.agent-card{padding:16px;background:var(--fa);border:1px solid var(--bo);border-radius:14px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.agent-card:hover{border-color:rgba(255,107,53,.28);background:rgba(255,107,53,.04);transform:translateY(-3px)}
.ae{font-size:24px;margin-bottom:9px;display:block}
.ag-name{font-family:var(--FD);font-size:13px;font-weight:700;margin-bottom:2px}
.ag-role{font-size:10.5px;color:var(--mu);line-height:1.35;min-height:28px}

/* CHARTS */
.chart-bars{display:flex;align-items:flex-end;gap:3px;height:90px;padding-top:8px}
.chart-bar{flex:1;border-radius:3px 3px 0 0;min-height:4px;transition:opacity .2s}
.chart-bar:hover{opacity:.7}

/* TOGGLE */
.toggle{position:relative;width:38px;height:20px;flex-shrink:0;display:inline-block}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:rgba(240,242,255,.12);border-radius:100px;cursor:pointer;transition:background .2s}
.toggle-slider::before{content:'';position:absolute;height:14px;width:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked+.toggle-slider{background:var(--te)}
.toggle input:checked+.toggle-slider::before{transform:translateX(18px)}

/* TABLE */
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);padding:10px 14px;text-align:left;border-bottom:1px solid var(--bo)}
.data-table td{font-size:12px;padding:11px 14px;border-bottom:1px solid var(--bo);color:rgba(240,242,255,.75)}
.data-table tr:hover td{background:rgba(255,255,255,.02)}

/* KANBAN */
.kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;align-items:flex-start}
.k-col{min-width:185px;max-width:200px;background:var(--fa);border:1px solid var(--bo);border-radius:14px;padding:12px;flex-shrink:0}
.k-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.k-title{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.k-count{font-size:10px;padding:2px 7px;border-radius:100px;background:rgba(240,242,255,.07);color:var(--mu);font-weight:600}
.k-card{padding:10px;background:rgba(255,255,255,.04);border:1px solid var(--bo);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.k-card:hover{border-color:rgba(255,107,53,.28);background:rgba(255,107,53,.04)}
.k-cn{font-size:11px;font-weight:600;margin-bottom:3px}
.k-cv{font-size:13px;font-weight:800;color:var(--te)}
.k-cp{font-size:10px;color:var(--mu)}
.k-add{width:100%;padding:8px;background:transparent;border:1px dashed var(--bo);border-radius:9px;color:var(--mu);font-size:11px;cursor:pointer;transition:all .2s;font-family:var(--FB)}
.k-add:hover{border-color:rgba(255,107,53,.3);color:var(--or)}

/* CHANNELS */
.ch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.chc{padding:20px 14px;background:var(--fa);border:1px solid var(--bo);border-radius:16px;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer;transition:all .28s}
.chc.connected{border-color:rgba(0,212,170,.28);background:rgba(0,212,170,.04)}
.chc:hover{transform:translateY(-4px);box-shadow:0 14px 44px rgba(0,0,0,.4)}
.chc-icon{font-size:26px}.chc-name{font-size:12px;font-weight:600}
.chc-status{font-size:9px;padding:3px 9px;border-radius:100px;font-weight:700;letter-spacing:.06em}
.chc.connected .chc-status{background:var(--td);color:var(--te)}
.chc:not(.connected) .chc-status{background:var(--fa);color:var(--mu);border:1px solid var(--bo)}

/* SKILLS */
.skill-card{padding:16px;background:var(--fa);border:1px solid var(--bo);border-radius:14px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.skill-card:hover{border-color:rgba(124,58,237,.3);background:rgba(124,58,237,.04);transform:translateY(-3px)}
.sk-emo{font-size:22px;margin-bottom:8px;display:block}
.sk-name{font-family:var(--FD);font-size:12.5px;font-weight:700;margin-bottom:3px}
.sk-desc{font-size:10.5px;color:var(--mu);line-height:1.4;min-height:30px}
.sk-cmd{font-size:9.5px;color:var(--te);margin-top:8px;font-family:monospace}

/* FUNNEL */
.fv-row{display:flex;align-items:center;gap:10px;font-size:12px;margin-bottom:8px}
.fv-label{min-width:90px;color:var(--mu)}
.fv-bar-wrap{flex:1;height:9px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden}
.fv-fill{height:100%;border-radius:5px;transition:width 1.2s cubic-bezier(.16,1,.3,1)}
.fv-pct{min-width:36px;text-align:right;font-size:11px;color:var(--mu)}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;text-align:center;color:var(--mu)}
.empty-icon{font-size:42px;margin-bottom:12px;opacity:.5}
.empty-title{font-size:15px;font-weight:600;margin-bottom:6px;color:rgba(240,242,255,.6)}

/* AGENT CHAT PANEL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:190;display:none}
.overlay.show{display:block}
.agent-chat-panel{position:fixed;top:0;right:0;width:420px;max-width:100vw;height:100vh;background:var(--bg2);border-left:1px solid var(--bo2);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease;box-shadow:-20px 0 60px rgba(0,0,0,.5)}
.agent-chat-panel.open{transform:translateX(0)}
.acp-hdr{padding:18px 20px;border-bottom:1px solid var(--bo);display:flex;align-items:center;gap:12px}
.acp-name{font-family:var(--FD);font-size:15px;font-weight:700}
.acp-role{font-size:11px;color:var(--mu)}
.acp-close{margin-left:auto;font-size:20px;cursor:pointer;color:var(--mu);transition:color .2s}
.acp-close:hover{color:var(--wh)}
.acp-msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;display:flex;flex-direction:column;gap:3px}
.msg.in{align-self:flex-start}.msg.out{align-self:flex-end}
.msg-from{font-size:10px;font-weight:600;color:var(--or)}
.msg-bub{padding:10px 13px;border-radius:13px;font-size:12.5px;line-height:1.5}
.msg.in .msg-bub{background:rgba(255,255,255,.06);border:1px solid var(--bo);border-bottom-left-radius:4px}
.msg.out .msg-bub{background:linear-gradient(135deg,rgba(255,107,53,.22),rgba(124,58,237,.18));border:1px solid rgba(255,107,53,.2);border-bottom-right-radius:4px}
.msg-meta{font-size:9px;color:rgba(240,242,255,.25)}
.acp-input-row{padding:14px;border-top:1px solid var(--bo);display:flex;gap:8px}
.acp-input{flex:1;background:var(--fa);border:1px solid var(--bo);border-radius:10px;padding:9px 13px;color:var(--wh);font-size:12px;font-family:var(--FB);outline:none}
.acp-send{padding:9px 16px;background:linear-gradient(135deg,var(--or),var(--vi));border:none;border-radius:100px;color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.acp-mic{padding:9px 12px;background:var(--td);border:1px solid rgba(0,212,170,.25);border-radius:100px;color:var(--te);font-size:13px;cursor:pointer}

/* TOAST */
#toasts{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--bg3);border:1px solid var(--bo2);border-radius:12px;padding:12px 18px;font-size:13px;box-shadow:0 12px 40px rgba(0,0,0,.5);display:flex;align-items:center;gap:10px;animation:toastIn .3s ease-out;max-width:90vw}
@keyframes toastIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* MODAL */
#modalWrap{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
#modalWrap.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bo2);border-radius:20px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal-hdr{padding:20px;border-bottom:1px solid var(--bo);display:flex;align-items:center;gap:12px}
.modal-title{font-family:var(--FD);font-size:17px;font-weight:700;flex:1}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.field label{font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--fa);border:1px solid var(--bo);border-radius:10px;padding:10px 13px;color:var(--wh);font-size:13px;font-family:var(--FB);outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(255,107,53,.3)}
.field select option{background:var(--bg2)}

/* ====== VOICE / MANOS LIBRE ====== */
#voiceFab{position:fixed;bottom:26px;right:26px;width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,var(--or),var(--vi));border:none;cursor:pointer;z-index:350;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 8px 30px rgba(255,107,53,.45);transition:transform .2s}
#voiceFab:hover{transform:scale(1.07)}
#voiceFab.listening{animation:fabPulse 1.4s ease-in-out infinite}
@keyframes fabPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,170,.5)}50%{box-shadow:0 0 0 18px rgba(0,212,170,0)}}
#voiceFab .wave-ring{position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--te);opacity:0}
#voiceFab.listening .wave-ring{animation:waveRing 1.4s ease-out infinite}
@keyframes waveRing{0%{opacity:.7;transform:scale(.9)}100%{opacity:0;transform:scale(1.5)}}

#voiceOverlay{position:fixed;inset:0;z-index:360;background:radial-gradient(circle at 50% 60%,rgba(124,58,237,.18),rgba(6,8,18,.96));backdrop-filter:blur(8px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px}
#voiceOverlay.show{display:flex}
.vo-orb{width:150px;height:150px;border-radius:50%;background:radial-gradient(circle at 40% 35%,var(--te),var(--vi) 70%,transparent);position:relative;display:flex;align-items:center;justify-content:center;box-shadow:0 0 80px rgba(0,212,170,.4)}
.vo-orb::before,.vo-orb::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid rgba(0,212,170,.4)}
.vo-orb.active::before{animation:orbR 2s ease-out infinite}
.vo-orb.active::after{animation:orbR 2s ease-out infinite .6s}
@keyframes orbR{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.6);opacity:0}}
.vo-orb-icon{font-size:50px;animation:orbFloat 3s ease-in-out infinite}
@keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.vo-status{font-family:var(--FD);font-size:22px;font-weight:700;text-align:center}
.vo-heard{font-size:15px;color:var(--te);min-height:24px;text-align:center;max-width:560px}
.vo-hint{font-size:12.5px;color:var(--mu);text-align:center}
.vo-chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:700px}
.vo-chip{padding:10px 16px;border-radius:100px;background:var(--fa);border:1px solid var(--bo2);font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px}
.vo-chip:hover{background:var(--od);border-color:rgba(255,107,53,.3);color:var(--or);transform:translateY(-2px)}
.vo-close{position:absolute;top:24px;right:28px;font-size:28px;cursor:pointer;color:var(--mu)}
.vo-close:hover{color:var(--wh)}
.vo-bars{display:flex;align-items:flex-end;gap:4px;height:34px}
.vo-bars span{width:5px;background:var(--te);border-radius:3px;height:8px}
#voiceOverlay.listening .vo-bars span{animation:voBar .8s ease-in-out infinite}

/* ============================================================
   VOICE / TTS / MANOS LIBRE  (Web Speech API)
   ============================================================ */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition || null;
const synth = window.speechSynthesis || null;
let voices = [];
let chosenVoice = null;
let wakeRec = null;      // continuous wake-word recognizer
let cmdRec = null;       // single-shot command recognizer
let wakeActive = false;  // is wake loop listening
let dictRec = null;      // dictation recognizer

/* Wake words across many languages */
const WAKE_WORDS = [
  'sellia','sell ia','sel ia','hola sellia','hola sell ia','ola sellia',
  'hello sellia','hey sellia','hi sellia','ok sellia','okay sellia',
  'bonjour sellia','salut sellia','ciao sellia','hallo sellia','hej sellia',
  'ola sell ia','oi sellia','olá sellia','hallo sell ia','hola celia','hola selia'
];

function normalize(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim()}

/* ---- TTS voice selection: most human voice per language ---- */
function loadVoices(){
  if(!synth)return;
  voices = synth.getVoices()||[];
  pickVoice();
}
function pickVoice(){
  if(!voices.length){voices=(synth&&synth.getVoices())||[]}
  if(!voices.length)return;
  const code = (LANG_CODES&&LANG_CODES[LANG])||navigator.language||'es-ES';
  const lang2 = code.slice(0,2).toLowerCase();
  // Preference: natural/neural/online voices for the active language
  const prefer = ['google','natural','neural','premium','enhanced','online','wavenet'];
  const sameLang = voices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith(lang2));
  const pool = sameLang.length?sameLang:voices;
  let best = pool.find(v=>prefer.some(p=>(v.name||'').toLowerCase().includes(p)));
  if(!best) best = pool.find(v=>v.lang&&v.lang.toLowerCase()===code.toLowerCase());
  chosenVoice = best || pool[0] || voices[0];
}
function speak(text){
  if(!synth||!text)return;
  try{
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if(chosenVoice) u.voice = chosenVoice;
    u.lang = (chosenVoice&&chosenVoice.lang) || (LANG_CODES&&LANG_CODES[LANG]) || 'es-ES';
    u.rate = 1.02; u.pitch = 1.04; u.volume = 1;
    synth.speak(u);
  }catch(e){}
}

/* ---- Voice overlay open/close ---- */
function openVoice(){
  const ov=document.getElementById('voiceOverlay');
  if(!ov)return;
  ov.classList.add('show');
  renderVoiceChips();

  startCommand();
}
function closeVoice(){
  const ov=document.getElementById('voiceOverlay');
  if(ov)ov.classList.remove('show');
  stopCommand();
}
function setVoiceStatus(t){const e=document.getElementById('voStatus');if(e)e.textContent=t}
function setVoiceHeard(t){const e=document.getElementById('voHeard');if(e)e.textContent=t?'"'+t+'"':''}
function setVoiceBars(on){const ov=document.getElementById('voiceOverlay');if(ov)ov.classList.toggle('listening',!!on)}

/* ---- Command chips (hands-free quick actions) ---- */
const VOICE_CHIPS = [
  {t:'🚀 Ayudame a crecer la cuenta',c:'growth'},
  {t:'📊 Mostrame el dashboard',c:'go dashboard'},
  {t:'🤖 Abrí los agentes IA',c:'go agentes'},
  {t:'💼 Mostrame el CRM',c:'go crm'},
  {t:'⚡ Ver automatizaciones',c:'go automatizaciones'},
  {t:'💬 Conversaciones',c:'go conversaciones'},
  {t:'📈 Analytics',c:'go analytics'},
  {t:'🔌 Integraciones & tokens',c:'go integraciones'}
];
function renderVoiceChips(){
  const w=document.getElementById('voChips');if(!w)return;
  w.innerHTML=VOICE_CHIPS.map(c=>'<button class="vo-chip" onclick="handleCommand(\''+c.c+'\',true)">'+c.t+'</button>').join('');
}

/* ---- Command recognition (single utterance) ---- */
function startCommand(){
  if(!SR){setVoiceStatus('Tu navegador no soporta reconocimiento de voz. Usá los botones.');return}
  stopCommand();
  cmdRec = new SR();
  cmdRec.lang = (LANG_CODES&&LANG_CODES[LANG])||'es-ES';
  cmdRec.interimResults = true;
  cmdRec.continuous = false;
  cmdRec.onstart=()=>{setVoiceBars(true);setVoiceStatus('Escuchando…')};
  cmdRec.onresult=e=>{
    let txt='';for(let i=0;i<e.results.length;i++)txt+=e.results[i][0].transcript;
    setVoiceHeard(txt);
    if(e.results[e.results.length-1].isFinal){handleCommand(txt,false)}
  };
  cmdRec.onerror=()=>{setVoiceBars(false);setVoiceStatus('No te escuché. Probá de nuevo.')};
  cmdRec.onend=()=>{setVoiceBars(false)};
  try{cmdRec.start()}catch(e){}
}
function stopCommand(){if(cmdRec){try{cmdRec.stop()}catch(e){}cmdRec=null}setVoiceBars(false)}

/* ---- Command parser: phrase -> action ---- */
const NAV_KEYWORDS = {
  dashboard:['dashboard','inicio','panel','tablero'],
  agentes:['agente','agentes','asesor','expertos'],
  skills:['skill','skills','habilidad','conocimiento'],
  crm:['crm','pipeline','embudo','negocios','deals','oportunidad'],
  conversaciones:['conversacion','conversaciones','chat','mensajes','chats'],
  automatizaciones:['automatizacion','automatizaciones','workflow','flujo','automatiza'],
  integraciones:['integracion','integraciones','token','tokens','api','apis','conectar'],
  analytics:['analytics','analitica','metricas','estadisticas','reportes','numeros'],
  canales:['canal','canales','whatsapp','instagram','telegram'],
  catalogo:['catalogo','productos','catálogo'],
  finanzas:['finanzas','dinero','ingresos','facturacion','contabilidad'],
  planes:['plan','planes','precio','precios','suscripcion'],
  alertas:['alerta','alertas','notificacion','notificaciones'],
  seguridad:['seguridad','proteccion','privacidad']
};
function handleCommand(raw, fromChip){
  const t = normalize(raw);
  if(!t)return;
  setVoiceHeard(raw);
  // explicit chip command form: "go <page>"
  if(t.startsWith('go ')){const id=t.slice(3).trim();speak('Abriendo '+(TITLES[id]||id));navigate(id);setVoiceStatus('Listo: '+(TITLES[id]||id));setTimeout(closeVoice,800);return}
  // growth flow
  if(t==='growth'||/crec|grow|aumenta|escala|vender mas|mas ventas|impulsa/.test(t)){growthFlow();return}
  // strip wake word if present
  let cmd=t;
  WAKE_WORDS.forEach(w=>{if(cmd.startsWith(w))cmd=cmd.slice(w.length).trim()});
  // navigation intents
  for(const id in NAV_KEYWORDS){
    if(NAV_KEYWORDS[id].some(k=>cmd.includes(k))){
      speak('Abriendo '+(TITLES[id]||id));
      navigate(id);
      setVoiceStatus('✅ '+(TITLES[id]||id));
      setTimeout(closeVoice,900);
      return;
    }
  }
  // create deal
  if(/nuevo negocio|nuevo deal|crear oportunidad|agregar negocio/.test(cmd)){navigate('crm');setTimeout(()=>{if(window.newDealModal)newDealModal()},300);speak('Creando un nuevo negocio');setTimeout(closeVoice,800);return}
  // help
  if(/ayuda|que podes hacer|opciones|comandos/.test(cmd)){speak('Puedo abrir cualquier sección, crear negocios, mostrar tus métricas o ayudarte a crecer la cuenta. Decime qué necesitás.');setVoiceStatus('Probá: "SellIA, ayudame a crecer la cuenta"');return}
  // fallback -> ask an agent / unknown
  setVoiceStatus('No reconocí el comando. Probá un chip o repetí.');
  speak('No entendí el comando. ¿Podés repetirlo?');
  if(!fromChip)setTimeout(startCommand,400);
}

/* ---- Growth flow: "ayúdame a crecer la cuenta" ---- */
function growthFlow(){
  setVoiceStatus('🚀 Activando plan de crecimiento…');
  speak('Perfecto. Estoy activando tu plan de crecimiento: voy a analizar tus leads, optimizar las secuencias y poner a trabajar a los agentes de ventas.');
  const steps=[
    '🔍 Analizando 1.247 leads con scoring IA…',
    '🎯 Alex Hormozi optimizando tu oferta…',
    '📧 Activando 3 secuencias de nurturing…',
    '🤖 Asignando agentes a leads calientes…',
    '📈 Proyección: +32% conversión en 30 días'
  ];
  let i=0;
  const tick=()=>{
    if(i<steps.length){setVoiceStatus(steps[i]);toast(steps[i]);i++;setTimeout(tick,1100)}
    else{speak('Listo. Tu motor de crecimiento está activo. Te llevo al panel de inteligencia.');navigate('inteligencia');setTimeout(closeVoice,1000)}
  };
  tick();
}

/* ---- Dictation (generic, returns text via callback) ---- */
function startDictation(cb){
  if(!SR){toast('🚫 Reconocimiento de voz no soportado');return}
  if(dictRec){try{dictRec.stop()}catch(e){}}
  dictRec=new SR();
  dictRec.lang=(LANG_CODES&&LANG_CODES[LANG])||'es-ES';
  dictRec.interimResults=false;dictRec.continuous=false;
  toast('🎙️ Hablá ahora…');
  dictRec.onresult=e=>{const txt=e.results[0][0].transcript;if(cb)cb(txt)};
  dictRec.onerror=()=>toast('🚫 No te escuché');
  try{dictRec.start()}catch(e){}
}

/* ---- Wake-word loop ("Hola SellIA" hands-free) ---- */
function toggleWake(){
  if(wakeActive){stopWake();return}
  startWake();
}
function startWake(){
  if(!SR){toast('🚫 Tu navegador no soporta el modo manos libres');return}
  wakeActive=true;
  const fab=document.getElementById('voiceFab');if(fab)fab.classList.add('listening');
  toast('🎙️ Manos libres activo — decí "Hola SellIA"');
  wakeRec=new SR();
  wakeRec.lang=(LANG_CODES&&LANG_CODES[LANG])||'es-ES';
  wakeRec.continuous=true;wakeRec.interimResults=true;
  wakeRec.onresult=e=>{
    let txt='';for(let i=e.resultIndex;i<e.results.length;i++)txt+=e.results[i][0].transcript;
    const n=normalize(txt);
    if(WAKE_WORDS.some(w=>n.includes(w))){
      try{wakeRec.stop()}catch(_){}
      speak('Sí, te escucho');
      openVoice();
    }
  };
  wakeRec.onerror=ev=>{if(ev.error==='not-allowed'||ev.error==='service-not-allowed'){stopWake();toast('🚫 Permiso de micrófono denegado')}};
  wakeRec.onend=()=>{if(wakeActive){try{wakeRec.start()}catch(e){}}};
  try{wakeRec.start()}catch(e){}
}
function stopWake(){
  wakeActive=false;
  const fab=document.getElementById('voiceFab');if(fab)fab.classList.remove('listening');
  if(wakeRec){try{wakeRec.stop()}catch(e){}wakeRec=null}
  toast('🔇 Manos libres desactivado');
}
