apiVersion: v2
name: sellia
description: SellIA - Plataforma de IA para ventas con enfoque en seguridad
type: application
version: 1.0.0
appVersion: "1.0.0"
dependencies:
  - name: postgresql
    version: "13.2.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "18.6.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: nginx-ingress-controller
    version: "9.9.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: nginx-ingress-controller.enabled
