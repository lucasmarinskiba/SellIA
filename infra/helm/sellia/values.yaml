# ============================================================
#  SellIA Helm Chart — Valores por defecto
# ============================================================

secrets:
  secretKey: ""
  databaseUrl: ""
  redisUrl: ""
  turnstileSecretKey: ""
  vapidPrivateKey: ""
  smtpPassword: ""
  hibpApiKey: ""
  elkApiKey: ""
  postgresPassword: ""
  databasePassword: ""
  redisPassword: ""

namespace:
  create: true

replicaCount: 1

image:
  registry: ghcr.io
  repository: sellia
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ---------------------------------------------------------------
# Backend
# ---------------------------------------------------------------
backend:
  enabled: true
  replicaCount: 2
  
  image:
    repository: backend
    tag: latest
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /api/v1/health
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  
  env:
    - name: ENVIRONMENT
      value: "production"
    - name: LOG_LEVEL
      value: "info"
    - name: ENABLE_OPENAPI
      value: "false"
    - name: ENABLE_METRICS
      value: "true"
    - name: METRICS_PORT
      value: "9090"
  
  envFromSecret:
    - name: SECRET_KEY
      secretKeyRef:
        name: sellia-secrets
        key: secret-key
    - name: DATABASE_URL
      secretKeyRef:
        name: sellia-secrets
        key: database-url
    - name: REDIS_URL
      secretKeyRef:
        name: sellia-secrets
        key: redis-url
    - name: TURNSTILE_SECRET_KEY
      secretKeyRef:
        name: sellia-secrets
        key: turnstile-secret-key
    - name: VAPID_PRIVATE_KEY
      secretKeyRef:
        name: sellia-secrets
        key: vapid-private-key
    - name: SMTP_PASSWORD
      secretKeyRef:
        name: sellia-secrets
        key: smtp-password
    - name: HIBP_API_KEY
      secretKeyRef:
        name: sellia-secrets
        key: hibp-api-key
    - name: ELK_API_KEY
      secretKeyRef:
        name: sellia-secrets
        key: elk-api-key
  
  pdb:
    enabled: true
    minAvailable: 1

# ---------------------------------------------------------------
# Frontend
# ---------------------------------------------------------------
frontend:
  enabled: true
  replicaCount: 2
  
  image:
    repository: frontend
    tag: latest
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  livenessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 10
  
  readinessProbe:
    httpGet:
      path: /
      port: 3000
    initialDelaySeconds: 5
    periodSeconds: 5
  
  env:
    - name: NODE_ENV
      value: "production"
    - name: NEXT_PUBLIC_API_URL
      value: "/api"
  
  pdb:
    enabled: true
    minAvailable: 1

# ---------------------------------------------------------------
# Envoy (edge proxy — reemplaza Nginx)
# ---------------------------------------------------------------
envoy:
  enabled: true
  replicaCount: 2
  
  image:
    repository: envoyproxy/envoy
    tag: "v1.30-latest"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  
  pdb:
    enabled: true
    minAvailable: 1

# ---------------------------------------------------------------
# Sidecar (autorización centralizada para Envoy ext_authz)
# ---------------------------------------------------------------
sidecar:
  enabled: true
  
  image:
    repository: sidecar
    tag: latest
    pullPolicy: IfNotPresent
  
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# ---------------------------------------------------------------
# ClamAV (anti-virus)
# ---------------------------------------------------------------
clamav:
  enabled: true
  replicaCount: 1
  
  image:
    repository: clamav/clamav
    tag: "latest"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 3310
    targetPort: 3310
  
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi
  
  persistence:
    enabled: true
    size: 5Gi
    accessMode: ReadWriteOnce

# ---------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/security-headers: "true"
    nginx.ingress.kubernetes.io/hsts: "max-age=31536000; includeSubDomains; preload"
    nginx.ingress.kubernetes.io/x-frame-options: "DENY"
    nginx.ingress.kubernetes.io/x-content-type-options: "nosniff"
    nginx.ingress.kubernetes.io/referrer-policy: "strict-origin-when-cross-origin"
  hosts:
    - host: sellia.example.com
      paths:
        - path: /
          pathType: Prefix
          service: envoy
  tls:
    - secretName: sellia-tls
      hosts:
        - sellia.example.com

# ---------------------------------------------------------------
# Network Policies
# ---------------------------------------------------------------
networkPolicy:
  enabled: true
  
  backend:
    ingress:
      - from:
          - podSelector:
              matchLabels:
                app.kubernetes.io/component: envoy
        ports:
          - protocol: TCP
            port: 8000
      - from:
          - namespaceSelector:
              matchLabels:
                name: monitoring
        ports:
          - protocol: TCP
            port: 9090
  
  frontend:
    ingress:
      - from:
          - podSelector:
              matchLabels:
                app.kubernetes.io/component: envoy
        ports:
          - protocol: TCP
            port: 3000
  
  redis:
    ingress:
      - from:
          - podSelector:
              matchLabels:
                app.kubernetes.io/component: backend
        ports:
          - protocol: TCP
            port: 6379
      - from:
          - podSelector:
              matchLabels:
                app.kubernetes.io/component: envoy
        ports:
          - protocol: TCP
            port: 6379
  
  postgresql:
    ingress:
      - from:
          - podSelector:
              matchLabels:
                app.kubernetes.io/component: backend
        ports:
          - protocol: TCP
            port: 5432

# ---------------------------------------------------------------
# Dependencias
# ---------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    database: sellia
    username: sellia
    existingSecret: sellia-secrets
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: database-password
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      limits:
        memory: 1Gi
        cpu: 1000m
      requests:
        memory: 512Mi
        cpu: 250m
  metrics:
    enabled: true

redis:
  enabled: true
  auth:
    existingSecret: sellia-secrets
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      limits:
        memory: 512Mi
        cpu: 500m
      requests:
        memory: 256Mi
        cpu: 100m
  metrics:
    enabled: true

nginx-ingress-controller:
  enabled: false
