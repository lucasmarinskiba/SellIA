{{ if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sellia.fullname" . }}
  labels:
    {{- include "sellia.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          # Todo el tráfico pasa por Envoy (edge proxy)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "sellia.fullname" $ }}-envoy
                port:
                  number: {{ $.Values.envoy.service.port }}
    {{- end }}
{{ end }}
