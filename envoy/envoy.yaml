# ========================================================================
# Envoy Edge Proxy Configuration — Docker Compose (Static)
# Reemplaza nginx.conf con routing, rate limiting, compresión y seguridad.
# ========================================================================

static_resources:
  listeners:
    - name: listener_http
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 80
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                use_remote_address: true
                xff_num_trusted_hops: 1

                # --- Access logging JSON (equivalente a nginx access_log) ---
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          timestamp: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          protocol: "%PROTOCOL%"
                          response_code: "%RESPONSE_CODE%"
                          response_flags: "%RESPONSE_FLAGS%"
                          bytes_received: "%BYTES_RECEIVED%"
                          bytes_sent: "%BYTES_SENT%"
                          duration_ms: "%DURATION%"
                          user_agent: "%REQ(USER-AGENT)%"
                          request_id: "%REQ(X-REQUEST-ID)%"
                          cf_connecting_ip: "%REQ(CF-CONNECTING-IP)%"
                          cf_ray: "%REQ(CF-RAY)%"
                          cf_ipcountry: "%REQ(CF-IPCOUNTRY)%"
                          cf_visitor: "%REQ(CF-VISITOR)%"
                          cf_bot_management: "%REQ(CF-BOT-MANAGEMENT)%"
                          cf_threat_score: "%REQ(CF-THREAT-SCORE)%"
                          x_forwarded_for: "%REQ(X-FORWARDED-FOR)%"
                          authority: "%REQ(:AUTHORITY)%"
                          upstream_host: "%UPSTREAM_HOST%"
                          upstream_cluster: "%UPSTREAM_CLUSTER%"

                # --- Routing ---
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: sellia
                      domains: ["*"]
                      routes:
                        # 1. Bloquear docs/redoc/openapi.json
                        - match:
                            safe_regex:
                              google_re2: {}
                              regex: "^/(docs|redoc|openapi\\.json)$"
                          direct_response:
                            status: 404
                            body:
                              inline_string: "Not Found"

                        # 2. Health check de Envoy
                        - match:
                            path: "/envoy-health"
                          direct_response:
                            status: 200
                            body:
                              inline_string: "healthy\n"

                        # 3. WebSocket endpoints
                        - match:
                            prefix: "/api/v1/ws/"
                          route:
                            cluster: backend
                            timeout: 0s
                            upgrade_configs:
                              - upgrade_type: websocket
                                enabled: true

                        # 4. Upload endpoint (mayor límite de body)
                        - match:
                            prefix: "/api/v1/upload"
                          route:
                            cluster: backend
                          request_headers_to_add:
                            - header:
                                key: "x-envoy-max-body"
                                value: "50M"

                        # 5. API backend
                        - match:
                            prefix: "/api/"
                          route:
                            cluster: backend
                          typed_per_filter_config:
                            envoy.filters.http.local_ratelimit:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                              stat_prefix: backend_ratelimit
                              token_bucket:
                                max_tokens: 20
                                tokens_per_fill: 10
                                fill_interval: 60s
                              filter_enabled:
                                runtime_key: local_rate_limit_enabled
                                default_value:
                                  numerator: 100
                                  denominator: HUNDRED
                              filter_enforced:
                                runtime_key: local_rate_limit_enforced
                                default_value:
                                  numerator: 100
                                  denominator: HUNDRED
                              response_headers_to_add:
                                - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                                  header:
                                    key: x-local-rate-limit
                                    value: 'true'
                          response_headers_to_add:
                            - header:
                                key: Cache-Control
                                value: "no-store, no-cache, must-revalidate, private"
                            - header:
                                key: Pragma
                                value: "no-cache"
                            - header:
                                key: Expires
                                value: "0"

                        # 6. Frontend (catch-all)
                        - match:
                            prefix: "/"
                          route:
                            cluster: frontend
                            timeout: 0s

                      # --- Headers de seguridad globales (equivalente a add_header de nginx) ---
                      response_headers_to_add:
                        - header:
                            key: X-Frame-Options
                            value: DENY
                        - header:
                            key: X-Content-Type-Options
                            value: nosniff
                        - header:
                            key: X-XSS-Protection
                            value: "1; mode=block"
                        - header:
                            key: Referrer-Policy
                            value: strict-origin-when-cross-origin
                        - header:
                            key: Permissions-Policy
                            value: "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
                        - header:
                            key: Strict-Transport-Security
                            value: "max-age=63072000; includeSubDomains; preload"

                # --- HTTP Filters Pipeline ---
                http_filters:
                  # 1. Lua filter para extraer IP real de Cloudflare (opcional, simple pass-through)
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      inline_code: |
                        function envoy_on_request(request_handle)
                          local cf_ip = request_handle:headers():get("CF-Connecting-IP")
                          if cf_ip then
                            request_handle:headers():add("X-Real-IP", cf_ip)
                          end
                        end

                  # 2. Local Rate Limit (global, menos restrictivo que el de ruta)
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: http_local_rate_limiter
                      token_bucket:
                        max_tokens: 200
                        tokens_per_fill: 100
                        fill_interval: 60s
                      filter_enabled:
                        runtime_key: local_rate_limit_enabled
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      filter_enforced:
                        runtime_key: local_rate_limit_enforced
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      response_headers_to_add:
                        - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          header:
                            key: x-local-rate-limit
                            value: 'true'

                  # 3. Compressor (gzip)
                  - name: envoy.filters.http.compressor
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.compressor.v3.Compressor
                      response_direction_config:
                        common_config:
                          min_content_length: 100
                          content_type:
                            - text/plain
                            - text/css
                            - text/xml
                            - application/json
                            - application/javascript
                            - application/rss+xml
                            - application/atom+xml
                            - image/svg+xml
                        disable_on_etag_header: false
                      request_direction_config:
                        common_config:
                          enabled:
                            default_value: false
                            runtime_key: request_compressor_enabled
                      compressor_library:
                        name: text_optimized
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.compression.gzip.compressor.v3.Gzip
                          memory_level: 6
                          window_bits: 12
                          compression_level: COMPRESSION_LEVEL_6
                          compression_strategy: DEFAULT_STRATEGY

                  # 4. Router (siempre último)
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: frontend
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: frontend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: frontend
                      port_value: 3000
      health_checks:
        - timeout: 5s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: /
      circuit_breakers:
        thresholds:
          - max_connections: 1000
            max_pending_requests: 1000
            max_requests: 1000
            max_retries: 3

    - name: backend
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend
                      port_value: 8000
      health_checks:
        - timeout: 5s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: /health
      circuit_breakers:
        thresholds:
          - max_connections: 1000
            max_pending_requests: 1000
            max_requests: 1000
            max_retries: 3

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
  access_log:
    - name: envoy.access_loggers.stdout
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
