# Fly.io config for SellIA Sellbot (minimalista)
app = "sellia"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile.sellbot"

[env]
  ENVIRONMENT = "production"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "20s"
    method = "GET"
    path = "/api/ping"

[processes]
  app = "uvicorn app.sellbot:app --host 0.0.0.0 --port 8000"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["app"]
