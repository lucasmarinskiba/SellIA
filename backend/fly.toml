# ============================================================
# SellIA Backend — Fly.io (alternativa a Render)
#
# Deploy:
#   cd backend
#   fly launch --no-deploy            # crea la app (o `fly apps create sellia-api`)
#   fly postgres create --name sellia-db && fly postgres attach sellia-db   # set DATABASE_URL
#   # Redis: Upstash → fly redis create   (set REDIS_URL)
#   fly secrets set ENVIRONMENT=production \
#       SECRET_KEY=$(openssl rand -hex 24) \
#       FERNET_SECRET=$(openssl rand -hex 24) \
#       FRONTEND_URL=https://sellia-brain.vercel.app \
#       ANTHROPIC_API_KEY=... OPENAI_API_KEY=... GROQ_API_KEY=...
#   fly deploy
#   fly ssh console -C "alembic upgrade head"      # migraciones
#   # Dominio: fly certs add api.sellia.app  (+ A/AAAA o CNAME en DNS)
#
# DATABASE_URL llega como postgres://… → config.py lo normaliza a +asyncpg.
# ============================================================

app = "sellia-api"
primary_region = "gru"   # São Paulo — baja latencia LATAM

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  PORT = "8000"

# ---- API web (process group "app") ----
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "20s"
    method = "GET"
    path = "/api/ping"

[processes]
  app = "uvicorn app.main_railway:app --host 0.0.0.0 --port 8000"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["app"]
