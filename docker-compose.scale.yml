version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sellia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # Backend API (4 workers = handle 4x load)
  api_1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sellia
      REDIS_URL: redis://redis:6379
      WORKER_ID: api_1
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1

  api_2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sellia
      REDIS_URL: redis://redis:6379
      WORKER_ID: api_2
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1

  api_3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sellia
      REDIS_URL: redis://redis:6379
      WORKER_ID: api_3
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1

  api_4:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sellia
      REDIS_URL: redis://redis:6379
      WORKER_ID: api_4
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1

  # Celery workers (10 workers = execute 10 tasks in parallel)
  celery_worker_1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sellia
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    command: celery -A app.core.tasks.sales_tasks worker -l info --concurrency=1

  celery_worker_2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sellia
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    command: celery -A app.core.tasks.sales_tasks worker -l info --concurrency=1

  celery_worker_3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sellia
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    command: celery -A app.core.tasks.sales_tasks worker -l info --concurrency=1

  # ... 10 workers total

  # Load balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api_1
      - api_2
      - api_3
      - api_4

volumes:
  postgres_data:
  redis_data:
