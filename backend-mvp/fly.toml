# fly.io config · production deploy.
# Run: fly launch --no-deploy && fly secrets set ... && fly deploy

app = "sellia-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "alembic upgrade head"
  strategy = "rolling"

[env]
  ENV = "prod"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 2
  processes = ["api"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 500
    soft_limit = 350

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/healthz"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
  cpus = 2
  processes = ["api"]

[processes]
  api = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips '*'"
  worker = "python -m app.jobs.worker"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  processes = ["worker"]

[metrics]
  port = 9091
  path = "/metrics"
