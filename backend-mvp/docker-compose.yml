services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sellia
      POSTGRES_USER: sellia
      POSTGRES_PASSWORD: sellia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "sellia"]
      interval: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  migrate:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    command: alembic upgrade head
    restart: "no"

  api:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers

  worker:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    command: python -m app.jobs.worker
    deploy:
      replicas: 2

  scheduler:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    command: python -m app.jobs.scheduler
    restart: unless-stopped

volumes:
  pgdata:
  ollama:
