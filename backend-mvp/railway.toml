# Railway deployment config · backend MVP
# Deploys 2 services: api + worker (shared image)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Provide envs via Railway dashboard (matching .env.example):
# DATABASE_URL · REDIS_URL · JWT_SECRET · ANTHROPIC_API_KEY · STRIPE_SECRET_KEY · etc.

[services.api]
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers"
numReplicas = 2

[services.worker]
startCommand = "python -m app.jobs.worker"
numReplicas = 1
