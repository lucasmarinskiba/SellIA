name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - 'backend-mvp/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend-mvp/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: backend-mvp

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sellia
          POSTGRES_PASSWORD: sellia
          POSTGRES_DB: sellia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sellia"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ENV: test
      SECRET_KEY: ci-secret-32-bytes-padding-please-now
      JWT_SECRET: ci-jwt-secret-256-bits-padding-test
      DATABASE_URL: postgresql+asyncpg://sellia:sellia@localhost:5432/sellia_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend-mvp/requirements-dev.txt

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Mypy types (non-blocking)
        run: mypy app/ || true

      - name: Apply migrations
        run: alembic upgrade head

      - name: Pytest
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=40

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./backend-mvp/.coverage
          fail_ci_if_error: false
