name: CI - Tests & Build

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/1
          SECRET_KEY: github-actions-test-secret-key-32-chars-long
          ENVIRONMENT: testing
          ENABLE_OPENAPI: "false"
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

      # ── Regenerar snapshot del cerebro (gen:brain) y verificar que esté al día ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerar brain-graph (gen:brain)
        working-directory: frontend
        run: node scripts/gen-brain-graph.mjs

      - name: Verificar snapshot commiteado al día
        working-directory: .
        run: |
          git diff --exit-code -- frontend/src/data/brain-graph.json \
            || (echo "::error::brain-graph.json desactualizado — corré 'npm run gen:brain' y commiteá." && exit 1)

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: |
          pip install ruff black
          ruff check app/
          black --check app/

  frontend-build:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA

  # ── Deploy backend a Render (sólo push a main, gated por CI verde) ──
  # Render corre alembic upgrade head (preDeployCommand) + healthcheck /health.
  # Vercel auto-deploya el frontend por su cuenta en cada push a main.
  deploy-backend:
    name: Deploy Backend (Render)
    needs: [backend-tests, backend-lint, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL no configurado — salteo deploy."
            exit 0
          fi
          curl -fsS -X POST "$HOOK" && echo "Deploy de Render disparado."
